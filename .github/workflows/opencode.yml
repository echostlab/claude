name: opencode

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  opencode:
    if: >-
      github.actor != 'opencode-agent[bot]' &&
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request && (
          contains(github.event.comment.body, ' /oc') ||
          startsWith(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, ' /opencode') ||
          startsWith(github.event.comment.body, '/opencode')
        )) ||
        (github.event_name == 'pull_request_review_comment' && (
          contains(github.event.comment.body, ' /oc') ||
          startsWith(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, ' /opencode') ||
          startsWith(github.event.comment.body, '/opencode')
        ))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
      statuses: write

    steps:
      - name: Resolve pull request context
        id: context
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number ?? context.payload.issue?.number;
            if (!prNumber) {
              core.setFailed('No pull request number found in the event payload.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title || '');
            core.setOutput('pr_body', pr.body || '');
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('comment_body', context.payload.comment?.body || '');

      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.context.outputs.pr_number }}/head
          fetch-depth: 0
          persist-credentials: false

      - name: Set Git user globally to github-actions
        uses: gotmax23/set-bot-git-user-action@main
        with:
          global: true
          bot: github-actions
          name: "Github Actions"

      - name: Install OpenCode
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Compose OpenCode prompt
        id: prompt
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          BASE_REF: ${{ steps.context.outputs.base_ref }}
          HEAD_REF: ${{ steps.context.outputs.head_ref }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          PR_TITLE: ${{ steps.context.outputs.pr_title }}
          PR_BODY: ${{ steps.context.outputs.pr_body }}
          COMMENT_BODY: ${{ steps.context.outputs.comment_body }}
        run: |
          set -euo pipefail

          DELIM="OPENCODE_PROMPT_$(date +%s%N)"
          {
            echo "prompt<<$DELIM"
            echo "You are running inside a non-interactive GitHub Actions code-review workflow."
            echo "Never ask the user, PR author, client, or workflow operator for clarification, approval, or permission."
            echo "Use the checked-in OpenCode configuration from the repository-root opencode.json plus the agents, commands, skills, prompts, and instructions under .opencode/."
            echo "Do not invoke opencode github run or any flow that depends on the OpenCode GitHub App identity."
            echo "Work only from the checked-out repository, git metadata, and GitHub context already provided in this prompt."
            echo "Produce a concise final review body in markdown."
            echo "If there are no significant issues, output exactly: No significant issues found in the reviewed changes."
            echo
            echo "Repository: $REPOSITORY"
            echo "Pull request: #$PR_NUMBER"
            echo "Base branch: $BASE_REF"
            echo "Head branch: $HEAD_REF"
            echo "Head SHA: $HEAD_SHA"
            echo
            echo "PR title:"
            echo "$PR_TITLE"
            echo
            echo "PR description:"
            echo "$PR_BODY"
            if [ -n "$COMMENT_BODY" ]; then
              echo
              echo "Trigger comment:"
              echo "$COMMENT_BODY"
            fi
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Run OpenCode review
        id: review
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_FOUNDRY_BASE_URL: ${{ secrets.AZURE_FOUNDRY_BASE_URL }}
          AZURE_FOUNDRY_API_KEY1: ${{ secrets.AZURE_OPENAI_API_KEY1 }}
          OPENCODE_CONFIG: ${{ github.workspace }}/opencode.json
          OPENCODE_PERMISSION: >-
            {"*":"allow","question":"deny","read":"allow","glob":"allow","grep":"allow","list":"allow","lsp":"allow","skill":{"*":"allow"},"webfetch":"allow","websearch":"allow","task":"allow","todowrite":"allow","repo_overview":"allow","repo_clone":"allow","external_directory":"allow","edit":"allow","github_*":"allow","context7_*":"allow","bash":{"*":"allow","rm -rf *":"deny"}}
          PROMPT: ${{ steps.prompt.outputs.prompt }}
        run: |
          set -euo pipefail
          mkdir -p .github/tmp

          opencode run --agent reviewer --model azure-foundry/gpt-5.4 "$PROMPT" | tee .github/tmp/opencode-review.txt

          BODY_DELIM="OPENCODE_REVIEW_BODY_$(date +%s%N)"
          {
            echo "body<<$BODY_DELIM"
            echo "<!-- opencode-review -->"
            echo "## OpenCode review"
            echo
            cat .github/tmp/opencode-review.txt
            echo
            echo "---"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "$BODY_DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert PR review comment
        if: always() && steps.context.outputs.pr_number != '' && steps.review.outputs.body != ''
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.review.outputs.body }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- opencode-review -->';
            const issue_number = Number(process.env.PR_NUMBER);
            const body = process.env.REVIEW_BODY;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
