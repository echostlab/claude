name: opencode

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Detect Trigger & Parse Options
        id: check
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association || '' }}
          TRUSTED_AUTHOR_ASSOCIATIONS: OWNER,MEMBER,COLLABORATOR
          ALLOWED_AGENT_OVERRIDES: build,plan,reviewer
          ALLOWED_VARIANT_OVERRIDES: default
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || '' }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          HAS_PR: ${{ github.event.pull_request.number != null || github.event.issue.pull_request != null }}
        run: |
          set -euo pipefail

          resolve_model() {
            local input="${1:-gpt-5.4}"
            case "$input" in
              gpt-5.3-codex) echo "azure-foundry/gpt-5.4" ;;
              azure-foundry/*) echo "$input" ;;
              *) echo "azure-foundry/gpt-5.4" ;;
            esac
          }

          extract_flag() {
            local key="$1"
            echo "$COMMENT_BODY" | grep -oiP "${key}=\K\S+" | head -1 || true
          }

          has_flag() {
            local key="$1"
            echo "$COMMENT_BODY" | grep -qiE "(^|[[:space:]])${key}="
          }

          csv_contains() {
            local csv_list="$1" probe="$2"
            local normalized_probe="${probe//[[:space:]]/}"
            normalized_probe="${normalized_probe,,}"
            IFS=',' read -r -a _items <<< "$csv_list"
            for candidate in "${_items[@]}"; do
              candidate="${candidate//[[:space:]]/}"
              if [[ "${candidate,,}" == "$normalized_probe" ]]; then return 0; fi
            done
            return 1
          }

          is_trusted_comment_author() {
            local association="${COMMENT_AUTHOR_ASSOCIATION^^}"
            csv_contains "$TRUSTED_AUTHOR_ASSOCIATIONS" "$association"
          }

          fail_invalid_flag() {
            local key="$1" reason="$2"
            echo "::error::Invalid /oc flag '${key}=': ${reason}"
            exit 1
          }

          require_non_empty_flag_value() {
            local key="$1" value="$2"
            if [[ -z "$value" ]]; then fail_invalid_flag "$key" "missing value"; fi
          }

          validate_agent() {
            local input="${1:-}" normalized="${input,,}"
            if [[ ! "$normalized" =~ ^[a-z0-9][a-z0-9_-]{0,63}$ ]]; then fail_invalid_flag "agent" "invalid format"; fi
            if ! is_trusted_comment_author; then fail_invalid_flag "agent" "untrusted author"; fi
            if ! csv_contains "$ALLOWED_AGENT_OVERRIDES" "$normalized"; then fail_invalid_flag "agent" "not allowlisted"; fi
            echo "$normalized"
          }

          validate_variant() {
            local input="${1:-}" normalized="${input,,}"
            if ! csv_contains "$ALLOWED_VARIANT_OVERRIDES" "$normalized"; then fail_invalid_flag "variant" "not allowlisted"; fi
            echo "$normalized"
          }

          validate_share() {
            local input="${1:-}" normalized="${input,,}"
            case "$normalized" in auto|manual|disabled) echo "$normalized" ;; *) fail_invalid_flag "share" "invalid value" ;; esac
          }

          SHOULD_RUN="false"
          RUN_KIND="none"
          FULL_MODEL="$(resolve_model "gpt-5.4")"
          SELECTED_AGENT=""
          SELECTED_VARIANT=""
          SELECTED_SHARE=""

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            SHOULD_RUN="true"
            RUN_KIND="auto_pr_review"
          elif [[ "$EVENT_NAME" == "issue_comment" || "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            if echo "$COMMENT_BODY" | grep -qiE '(^|[[:space:]])/(oc|opencode)\b'; then
              SELECTED_MODEL="$(extract_flag "model")"
              FULL_MODEL="$(resolve_model "${SELECTED_MODEL:-gpt-5.4}")"
              if has_flag "agent"; then RAW_AGENT="$(extract_flag "agent")"; require_non_empty_flag_value "agent" "$RAW_AGENT"; SELECTED_AGENT="$(validate_agent "$RAW_AGENT")"; fi
              if has_flag "variant"; then RAW_VARIANT="$(extract_flag "variant")"; require_non_empty_flag_value "variant" "$RAW_VARIANT"; SELECTED_VARIANT="$(validate_variant "$RAW_VARIANT")"; fi
              if has_flag "share"; then RAW_SHARE="$(extract_flag "share")"; require_non_empty_flag_value "share" "$RAW_SHARE"; SELECTED_SHARE="$(validate_share "$RAW_SHARE")"; fi

              if [[ "$HAS_PR" == "true" ]]; then SHOULD_RUN="true"; RUN_KIND="manual_pr_review"; else SHOULD_RUN="true"; RUN_KIND="issue_task"; fi
            fi
          fi

          # 1. Exportamos todo de manera estricta a GITHUB_OUTPUT
          {
            echo "should_run=$SHOULD_RUN"
            echo "run_kind=$RUN_KIND"
            echo "pr_number=$PR_NUMBER"
            echo "issue_number=$ISSUE_NUMBER"
            echo "model=$FULL_MODEL"
            echo "agent=$SELECTED_AGENT"
            echo "variant=$SELECTED_VARIANT"
            echo "share=$SELECTED_SHARE"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install OCX
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://ocx.kdco.dev/install.sh | sh
          mkdir -p ~/.config
          sudo apt update 
          sudo apt install ripgrep
          bash ./.opencode/install.sh

      - name: Setup Bun
        if: steps.check.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install repo dependencies (optional)
        if: steps.check.outputs.should_run == 'true' && hashFiles('package.json') != ''
        run: sudo npm install -g --no-audit --no-fund 

      - name: Compose OpenCode prompt
        if: steps.check.outputs.should_run == 'true'
        id: compose
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          set -euo pipefail

          TITLE="${PR_TITLE:-$ISSUE_TITLE}"
          FINAL_PROMPT=""

          if [[ "$EVENT_NAME" == "issue_comment" || "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            FINAL_PROMPT="Title: ${TITLE}\n\nComment:\n${COMMENT_BODY}"
          else
            FINAL_PROMPT="Title: ${TITLE}\n\nBody:\n${PR_BODY:-$ISSUE_BODY}"
          fi

          # Enviamos el prompt íntegro al OUTPUT del paso
          DELIM="OPENCODE_PROMPT_EOF_$(date +%s%N)"
          {
            echo "prompt<<$DELIM"
            echo -e "$FINAL_PROMPT"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Export vars & Set Azure
        if: steps.check.outputs.should_run == 'true'
        id: config
        shell: bash
        run: |
          CURRENT_DIR="$(pwd)"
          CONFIG_FILE="$CURRENT_DIR/.opencode/opencode.json"

          if [ ! -f "$CONFIG_FILE" ]; then
             echo "Config file not found: $CONFIG_FILE"
             exit 1
          fi
          
          # También lo exportamos como output por las dudas con el linter
          echo "opencode_config=$CONFIG_FILE" >> "$GITHUB_OUTPUT"
          echo "opencode_config_dir=$CURRENT_DIR/.opencode" >> "$GITHUB_OUTPUT"
    
      - name: Run OpenCode Review
        if: steps.check.outputs.should_run == 'true'
        uses: sst/opencode/github@latest
        env:
          AZURE_OPENAI_API_KEY1: ${{ secrets.AZURE_OPENAI_API_KEY1 }}
          OPENCODE_CONFIG: ${{ steps.config.outputs.opencode_config }}
          OPENCODE_CONFIG_DIR: ${{ steps.config.outputs.opencode_config_dir }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_RESOURCE_NAME: "opens6505134568"
        with:
          # Aquí llamamos directamente a las variables desde los outputs de los pasos
          model: ${{ steps.check.outputs.model }}
          agent: task
          variant: ${{ steps.check.outputs.variant != '' && steps.check.outputs.variant || null }}
          share: ${{ steps.check.outputs.share != '' && steps.check.outputs.share || null }}
          prompt: ${{ steps.compose.outputs.prompt }}

      - name: Report failure
        if: failure() && steps.check.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          # Llamando a los números desde el output de check
          PR_NUMBER: ${{ steps.check.outputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.check.outputs.issue_number }}
          RUN_KIND: ${{ steps.check.outputs.run_kind }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = process.env.RUN_KIND === 'issue_task' ? Number(process.env.ISSUE_NUMBER) : Number(process.env.PR_NUMBER);
            const body = process.env.RUN_KIND === 'issue_task' 
              ? `🤖 Task failed.\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` 
              : `🤖 Review failed.\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
